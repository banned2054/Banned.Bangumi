name: CI

on:
    pull_request:
        branches:
            - master
    push:
        branches:
            - master
    workflow_dispatch:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    verify:
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Set up .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "10.0.x"

            - name: Restore dependencies
              run: dotnet restore Banned.Bangumi.slnx

            - name: Build solution
              run: dotnet build Banned.Bangumi.slnx --configuration Release --no-restore

            - name: Run tests
              run: dotnet test Banned.Bangumi.slnx --configuration Release --no-build

            - name: Publish Native AOT smoke test
              run: dotnet publish Banned.Bangumi.AotSmoke/Banned.Bangumi.AotSmoke.csproj --configuration Release --runtime linux-x64 -p:PublishAot=true --output "${{ runner.temp }}/aot-smoke"

            - name: Run Native AOT smoke test
              run: "${{ runner.temp }}/aot-smoke/Banned.Bangumi.AotSmoke"
