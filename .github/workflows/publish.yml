name: Build and Push NuGet Package

on:
    release:
        types: [published] # 只有发布（Publish）后才触发；创建草稿不会触发

jobs:
    build:
        runs-on: ubuntu-latest # Can be changed to windows-latest if needed
        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Set up .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "10.0.x" # Adjust as per your project needs

            - name: Restore dependencies
              run: dotnet restore Banned.Bangumi/Banned.Bangumi.csproj

            - name: Build the project
              run: dotnet build Banned.Bangumi/Banned.Bangumi.csproj --configuration Release --no-restore

            - name: Pack the project
              run: dotnet pack Banned.Bangumi/Banned.Bangumi.csproj --configuration Release --no-build --output nupkg

            - name: Install xmllint
              run: |
                  sudo apt-get update && sudo apt-get install -y libxml2-utils
                  xmllint --version  # 检查 xmllint 是否成功安装

            - name: Extract version from .csproj
              id: extract_version
              run: |
                  VERSION=$(xmllint --xpath "string(//Project/PropertyGroup/Version)" Banned.Bangumi/Banned.Bangumi.csproj)
                  echo "version=$VERSION" >> $GITHUB_ENV

            - name: Log in to NuGet with Trusted Publishing
              uses: NuGet/login@v1
              id: login
              with:
                  user: ${{ vars.NUGET_USER }}

            - name: Push NuGet package
              run: |
                  NUPKG_FILE=$(find nupkg -name "Banned.Bangumi.$version.nupkg" -print -quit)
                  if [ -z "$NUPKG_FILE" ]; then
                    echo "Error: NuGet package not found!"
                    exit 1
                  fi
                  echo "Pushing $NUPKG_FILE to NuGet..."
                  dotnet nuget push "$NUPKG_FILE" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source "https://api.nuget.org/v3/index.json" --skip-duplicate
